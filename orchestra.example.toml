# orchestra default config. Copy to orchestra.toml and edit.
# Per-run overrides live in runs/<run>/STATE.json.config.

[models]
author = "claude-opus-4-8"     # Claude does the planning & implementation
reviewer = "gpt-5-codex"       # Codex does the independent review (set to your codex model)

[max_rounds]
highlevel = 6                  # Stage A is human-driven; this is a safety cap
impl_plan = 4                  # Stage B auto-loop cap
implementation = 5             # Stage C auto-loop cap

# Human-in-the-loop level per stage: heavy | some | none
[gate]
highlevel = "heavy"
impl_plan = "some"
implementation = "none"

# Least-privilege per stage.
[sandbox]
# Claude permission-mode for the author:
author_plan = "plan"           # planning stages: no file edits
author_impl = "acceptEdits"    # implementation: edits confined to the worktree
# Codex sandbox for the reviewer (always read-only — never mutates what it reviews):
reviewer = "read-only"

[budget]
wall_clock_seconds = 0         # 0 = unlimited
tokens = 0                     # 0 = unlimited

[behavior]
fresh_author_on_revise = true  # true = fresh session each revise round (independence)
                               # false = resume author session (cheaper, carries context)
dry_run = false                # print the claude/codex commands instead of running them
