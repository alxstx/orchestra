# orchestra default config. Copy to orchestra.toml and edit.
# Per-run overrides live in runs/<run>/STATE.json.config.

[models]
# Claude author: prefer an alias so it tracks the latest model; pin an exact id
# (e.g. "claude-opus-4-8") only when you need reproducibility.
author = "opus"
# Codex reviewer: leave commented / empty to use Codex's own configured default
# model (recommended — avoids hardcoding an id that may rot). Set explicitly to
# pin one. When unset, the orchestrator omits --model on the codex invocation.
# reviewer = "<codex-model-id>"

[max_rounds]
# Hard ceiling on review rounds per stage (DESIGN §4.1). If a stage hasn't settled
# to APPROVE within its ceiling, the loop STOPS IMMEDIATELY and flags (stuck) — it
# never runs an extra round and never auto-advances with unresolved blockers.
# APPROVE (clean OR with nits) settles at any round; nits never add a round.
highlevel = 15                 # Stage A is human-driven; generous safety cap
impl_plan = 15                 # Stage B auto-loop ceiling
implementation = 15            # Stage C auto-loop ceiling

# Per-stage APPROVE confidence floor. An APPROVE below the floor downgrades to
# awaiting_human instead of auto-advancing. 0 = disabled. Most useful on the
# autonomous (none-gate) implementation stage.
[min_confidence]
highlevel = 0.0
impl_plan = 0.0
implementation = 0.6

# Human-in-the-loop level per stage: heavy | some | none
[gate]
highlevel = "heavy"
impl_plan = "some"
implementation = "none"

# Least-privilege per stage.
[sandbox]
# Claude author:
author_plan = "read-only"      # planning stages: whitelist read tools only; capture .result
                               #   (NOT --permission-mode plan — see DESIGN §6 ⚠️)
author_impl = "acceptEdits"    # implementation: edits confined to the worktree via --add-dir
# Codex reviewer is always read-only. On `codex exec` (Stage A/B) this is
# `--sandbox read-only`; the `codex exec review` path (Stage C) is intrinsically
# read-only (no --sandbox flag there).
reviewer = "read-only"

# Strip ambient context so the blackboard is the ONLY channel (DESIGN §6.1).
# Fresh sessions stop conversation carryover; these stop config/hooks/MCP/rules
# leakage and make runs reproducible.
[isolation]
claude_bare = true               # --bare: skip hooks/LSP/plugins (or use --safe-mode)
claude_setting_sources = ""      # --setting-sources "": load no user/project/local settings
claude_strict_mcp = true         # --strict-mcp-config: ignore ambient MCP servers
claude_no_session_persistence = true  # --no-session-persistence
codex_ignore_user_config = true  # --ignore-user-config
codex_ignore_rules = true        # --ignore-rules
codex_ephemeral = true           # --ephemeral: don't persist session files

# Cost is bounded mechanically, independent of max_rounds (which only bounds
# iteration count). Non-zero defaults so a runaway is capped out of the box.
[budget]
wall_clock_seconds = 3600      # per run; 0 = unlimited (not recommended)
tokens = 2000000               # per run; 0 = unlimited (not recommended)
call_timeout_seconds = 600     # per claude/codex subprocess; a hung child is killed

# Supervisory monitor (DESIGN §10.1): an optional concurrent overseer that judges
# run HEALTH (not the artifact) and writes accumulating reports under monitor/.
# It is single-writer-safe — it only writes monitor/; the orchestrator reads
# monitor/HALT. Most of the time it should not intervene.
[monitor]
enabled = true
mode = "advisory"              # off | advisory (report/warn only) | enforcing (may halt + flag)
interval_seconds = 300         # how often the overseer wakes to assess
stage_soft_timeout = 1800      # a stage running longer wakes the monitor to JUDGE (does NOT kill)
intervene_min_confidence = 0.8 # enforcing mode: only halt on an 'intervene' at/above this confidence
# model = "<judge-model>"      # optional; defaults to a capable judge model

[behavior]
fresh_author_on_revise = true  # true = fresh session each revise round (independence)
                               # false = resume author session (cheaper, carries context)
stop_on_oscillation = false    # false = give a stage its full max_rounds before giving up
                               #   (oscillation only surfaced as a warning); true = bail
                               #   early to stuck(oscillation) as soon as a loop is detected
dry_run = false                # print the claude/codex commands instead of running them
